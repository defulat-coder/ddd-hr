spring:
  application:
    name: hr-system
  
  datasource:
    url: jdbc:h2:mem:hrdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

knife4j:
  enable: true
  setting:
    language: zh_cn

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Shanghai

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    com.company.hr: DEBUG
    com.baomidou.mybatisplus: DEBUG
