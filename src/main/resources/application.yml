spring:
  application:
    name: hr-system
  
  datasource:
    url: jdbc:h2:mem:hrdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Shanghai

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    com.company.hr: DEBUG
    org.hibernate.SQL: DEBUG

